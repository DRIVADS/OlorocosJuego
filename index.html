<!DOCTYPE html>
<html>
<head>
    <title>Batalla de Cartas</title>
    <!-- META VIEWPORT: Escala correcta en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        /* --- 1. FUENTES --- */
        @font-face { font-family: 'MiFuenteTexto'; src: url('fuente_texto.ttf'); }
        @font-face { font-family: 'MiFuenteTitulo'; src: url('fuente_titulo.otf'); }

        /* --- 2. GENERAL --- */
        body { 
            font-family: 'MiFuenteTexto', sans-serif; 
            background-color: #1a1a1a; color: white; text-align: center; margin: 0; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, h4, .btn-menu, #btnComenzar, #dado, .btn-fin, .btn-modal {
            font-family: 'MiFuenteTitulo', serif; letter-spacing: 1px; text-shadow: 2px 2px 4px #000;
        }

        /* --- 3. PANTALLA GIRAR (SOLO MÓVIL VERTICAL) --- */
        #rotate-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; flex-direction: column; justify-content: center; align-items: center;
            color: gold; font-size: 20px; font-family: 'MiFuenteTitulo';
        }
        .phone-icon { width: 60px; height: 100px; border: 3px solid white; border-radius: 10px; animation: rotate 2s infinite; margin-bottom: 20px; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (orientation: portrait) { #rotate-warning { display: flex !important; } .pantalla { display: none !important; } }

        /* --- 4. FONDOS --- */
        .pantalla { 
            display: none; flex-direction: column; align-items: center; padding: 10px; 
            width: 100vw; height: 100vh; background-size: cover; background-position: center; 
            box-sizing: border-box; overflow-y: auto;
        }
        #pantalla-login { background-image: url('fondo_login.png'); box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.5); justify-content: center; }
        #pantalla-lobby { background-image: url('fondo_lobby.png'); box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.6); }
        #pantalla-seleccion { background-color: #222; background-image: linear-gradient(45deg, #222 25%, #2a2a2a 25%, #2a2a2a 50%, #222 50%, #222 75%, #2a2a2a 75%, #2a2a2a 100%); background-size: 40px 40px; }
        #pantalla-juego { background-image: url('fondo_juego.png'); box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.3); overflow: hidden; justify-content: flex-start; }

        /* --- ELEMENTOS UI --- */
        .logo-principal { width: 350px; max-width: 60%; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .contenedor-lobby { display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: 10px; width: 100%; }
        .personaje-lateral { height: 70vh; width: auto; filter: drop-shadow(0 0 15px black); }
        .menu-caja { background: rgba(40,40,40,0.9); padding: 30px; border-radius: 15px; border: 2px solid #555; box-shadow: 0 0 30px black; width: 300px; max-width: 90%; backdrop-filter: blur(5px); }
        
        input[type="text"] { padding: 12px; font-size: 18px; margin: 10px 0; width: 85%; border-radius: 5px; border: none; text-align: center; font-family: 'MiFuenteTexto'; }
        .btn-menu { display: block; width: 100%; padding: 12px; margin: 8px 0; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .btn-menu:active { transform: translateY(4px); box-shadow: none; }
        .btn-cpu { background: #0077cc; } .btn-pvp { background: #cc00cc; } .btn-retar { background: #ff8800; }
        .separador { border-top: 1px solid #555; margin: 15px 0; }

        /* --- EL DADO (ATRIBUTO) --- */
        /* Restaurado estilo caja grande y llamativa */
        #dado {
            font-size: 28px;
            color: gold;
            font-weight: bold;
            margin: 5px 15px;
            border: 3px solid gold;
            background-color: #333;
            padding: 10px 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 15px gold;
            min-width: 150px;
            text-transform: uppercase;
        }

        /* --- MESA DE JUEGO --- */
        #mesa { 
            height: 45vh; width: 95%; max-width: 1000px;
            border: 2px dashed rgba(255,255,255,0.3); 
            margin: 5px auto; 
            display: flex; justify-content: space-around; align-items: center; 
            background-color: rgba(0,0,0,0.6); border-radius: 15px; 
        }

        /* --- MANO DEL JUGADOR (CON SCROLL) --- */
        #miMano { 
            display: flex; 
            /* Alineación a la izquierda para que el scroll funcione natural */
            justify-content: flex-start; 
            gap: 10px; 
            position: fixed; bottom: 0; width: 100%; 
            padding: 10px; 
            background: rgba(0,0,0,0.8); z-index: 100;
            overflow-x: auto; /* Permitir deslizamiento */
            box-sizing: border-box;
        }
        /* Ocultar barra de scroll fea pero permitir scroll */
        #miMano::-webkit-scrollbar { height: 5px; }
        #miMano::-webkit-scrollbar-thumb { background: gold; border-radius: 5px; }

        /* --- ESTILOS DE CARTA (GRANDES) --- */
        .carta { 
            width: 150px; height: 230px; /* Tamaño generoso */
            background-color: #eee; color: black; border-radius: 10px; padding: 5px; 
            cursor: pointer; border: 4px solid #444; 
            display: flex; flex-direction: column; align-items: center; 
            transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            flex-shrink: 0; /* IMPEDIR QUE SE ENCOJAN */
        }
        .carta:hover { transform: translateY(-15px); border-color: gold; z-index: 10; }
        .carta-deshabilitada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
        
        .carta-dorso { 
            width: 150px; height: 230px; 
            background-image: url('dorso.png'); background-size: cover; background-position: center; 
            border: 4px solid #fff; border-radius: 10px; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .carta-titulo { font-family: 'MiFuenteTitulo'; font-size: 14px; margin-bottom: 4px; text-transform: uppercase; white-space: nowrap; overflow: hidden; width: 100%; font-weight: bold;}
        .carta-img { width: 100%; height: 110px; object-fit: contain; background-color: #fff; border-radius: 5px; margin-bottom: 4px; border: 1px solid #ccc; }
        .carta-stats { font-size: 11px; text-align: left; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background-color: #ddd; padding: 3px; border-radius: 4px; }
        .stat-item { padding: 0 2px; }
        
        .slot-vacio { width: 150px; height: 230px; border: 3px dashed #aaa; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: #eee; flex-direction:column; text-shadow: 1px 1px 2px black; font-size: 14px;}

        /* --- PANTALLA SELECCION (ARREGLADA) --- */
        #pantalla-seleccion {
            padding-bottom: 80px; /* Espacio para el botón flotante */
        }
        .grid-seleccion { 
            display: grid; 
            /* Cartas más grandes en la selección */
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; 
            width: 95%; max-width: 1000px;
            overflow-y: auto; /* Scroll si hay muchas cartas */
        }
        .carta-seleccion { 
            width: 100%; height: 180px; 
            background-color: #444; border: 3px solid #666; 
            border-radius: 8px; cursor: pointer; position: relative; opacity: 0.9; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .carta-seleccion.seleccionada { border-color: #0f0; background-color: #224422; box-shadow: 0 0 15px #0f0; opacity: 1; transform: scale(1.05); }
        .carta-seleccion .img-mini { width: 90%; height: 100px; object-fit: contain; background: white; margin-top: 5px; }

        /* BARRA BOTÓN COMENZAR */
        .barra-inferior {
            background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.8));
            width: 100%; padding: 15px; position: fixed; bottom: 0; left:0;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        #btnComenzar { 
            padding: 15px 50px; font-size: 22px; 
            background-color: #555; color: #aaa; 
            border: none; border-radius: 30px; cursor: not-allowed; 
            transition: 0.3s;
        }
        #btnComenzar.activo { background-color: #00cc00; color: white; cursor: pointer; box-shadow: 0 0 20px #00cc00; transform: scale(1.1); }

        /* MODALES */
        #overlay-dado { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        #img-dado { width: 200px; height: 200px; }
        #texto-dado { font-size: 35px; margin-top: 20px; color: gold; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 25px; border-radius: 15px; border: 3px solid gold; width: 90%; max-width: 400px; box-shadow: 0 0 30px gold; }
        .btn-modal { padding: 10px 25px; font-size: 16px; background: gold; color: black; border: none; cursor: pointer; border-radius: 5px; margin: 10px; font-weight: bold;}
        
        .contenedor-botones-fin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 15px; z-index: 200; flex-wrap: wrap; justify-content: center;}
        .btn-fin { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; color: white; box-shadow: 0 0 15px black; }
        .btn-mismo { background-color: #0088cc; } .btn-cambiar { background-color: #cc8800; } .btn-salir { background-color: #cc0000; }

        /* --- MEDIA QUERIES (Móvil Horizontal) --- */
        @media (max-height: 500px) {
            .logo-principal { width: 180px; }
            .personaje-lateral { display: none; } 
            .menu-caja { padding: 15px; width: 60%; }
            
            #mesa { height: 40vh; margin-top: 5px; }
            #dado { font-size: 18px; padding: 5px 15px; min-width: 100px; }
            
            /* Cartas un pelín más chicas en móvil para ver más mesa, pero no diminutas */
            .carta, .carta-dorso, .slot-vacio { width: 110px; height: 170px; }
            .carta-img { height: 80px; }
            .carta-stats { font-size: 9px; }
            
            /* Ajuste mano */
            #miMano .carta { width: 100px; height: 150px; }
            #miMano .carta-img { height: 60px; }
        }
    </style>
</head>
<body>

    <div id="rotate-warning">
        <div class="phone-icon"></div>
        <p>GIRA TU TELÉFONO</p>
    </div>

    <!-- OVERLAYS -->
    <div id="overlay-dado"><img src="dado.gif" id="img-dado" alt="Girando..."><div id="texto-dado">¡TIRANDO EL DADO!</div></div>
    
    <!-- MODALES -->
    <div id="modal-codigo" class="modal"><div class="modal-content"><h3>Carta Bloqueada</h3><input type="text" id="inputCodigo" placeholder="CÓDIGO AQUÍ"><br><button class="btn-modal" onclick="verificarCodigo(); sonarClick();">Desbloquear</button><button class="btn-modal" style="background:#555;color:white" onclick="cerrarModal('modal-codigo'); sonarClick();">Cancelar</button><p id="errorCodigo" style="color:red; font-size:12px;"></p></div></div>
    
    <div id="modal-invitacion" class="modal"><div class="modal-content" style="border-color: #ff8800;"><h3>¡DESAFÍO RECIBIDO!</h3><p id="textoInvitacion"></p><button class="btn-modal" onclick="responderInvitacion(true); sonarClick();">ACEPTAR</button><button class="btn-modal" style="background:#cc0000;color:white" onclick="responderInvitacion(false); sonarClick();">RECHAZAR</button></div></div>

    <div id="modal-espera" class="modal"><div class="modal-content" style="text-align:center;"><h3>Conectando...</h3><p id="textoEspera">Por favor espera...</p><button class="btn-modal" style="background:#555;color:white;font-size:12px;" onclick="cerrarModal('modal-espera'); sonarClick();">Cancelar / Cerrar</button></div></div>

    <div id="modal-exito" class="modal"><div class="modal-content" style="border-color:#0f0;"><h2 style="color:#0f0">¡FELICIDADES!</h2><h3 id="nombreCartaDesbloqueada" style="color:gold"></h3><button class="btn-modal" onclick="cerrarModal('modal-exito'); sonarClick();">ACEPTAR</button></div></div>

    <!-- 1. LOGIN -->
    <div id="pantalla-login" class="pantalla" style="display:flex;">
        <img src="logo.png" class="logo-principal">
        <div class="menu-caja">
            <h3>¿Cómo te llamas?</h3>
            <input type="text" id="inputNombre" placeholder="Tu Nickname" maxlength="12">
            <br>
            <button class="btn-menu btn-cpu" style="background:gold; color:black; font-weight:bold;" onclick="entrarLobby(); sonarClick();">ENTRAR</button>
        </div>
    </div>

    <!-- 2. LOBBY -->
    <div id="pantalla-lobby" class="pantalla">
        <img src="logo.png" style="width:150px; filter:drop-shadow(0 0 5px black);">
        <h1 style="margin-top:0;">LOBBY DE JUEGO</h1>
        <h3 id="saludoLobby" style="color:#ddd; margin:0 0 10px 0;">Bienvenido</h3>
        <div class="contenedor-lobby">
            <div class="menu-caja">
                <button class="btn-menu btn-cpu" onclick="buscarPartida('cpu'); sonarClick();">Jugar vs CPU</button>
                <button class="btn-menu btn-pvp" onclick="buscarPartida('random'); sonarClick();">Buscar Usuario Libre</button>
                <div class="separador"></div>
                <h4>Retar a un Amigo</h4>
                <input type="text" id="inputRival" placeholder="Nombre de tu amigo">
                <button class="btn-menu btn-retar" onclick="retarAmigo(); sonarClick();">RETAR</button>
            </div>
            <img src="personaje.png" class="personaje-lateral">
        </div>
    </div>

    <!-- 3. SELECCION (Mejorada) -->
    <div id="pantalla-seleccion" class="pantalla">
        <h1 style="margin-top:10px;">Construye tu Mazo</h1>
        <div id="gridCartas" class="grid-seleccion"></div>
        
        <div class="barra-inferior">
            <span id="msgSeleccion" style="font-size: 20px; font-weight:bold; color: gold;">0 / 5</span>
            <button id="btnComenzar" onclick="enviarSeleccion(); sonarClick();">COMENZAR</button>
        </div>
    </div>

    <!-- 4. JUEGO (Mejorado) -->
    <div id="pantalla-juego" class="pantalla">
        <!-- Encabezado de Batalla -->
        <div style="display:flex; justify-content:center; align-items:center; width:100%; margin-top:5px;">
            <div id="dado">???</div>
        </div>
        <div id="mensaje" style="font-weight:bold; color:#ccc; margin-bottom:5px;">Esperando...</div>
        
        <div id="mesa"></div>
        <div id="miMano"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // --- AUDIO ---
        const audioFondo = new Audio('musica_fondo.mp3'); audioFondo.loop = true; audioFondo.volume = 0.3;
        const sfxClick = new Audio('click.wav');
        const sfxSelect = new Audio('card_select.wav');
        const sfxJugar = new Audio('card_place.wav');
        const musicVictoria = new Audio('victoria.wav');
        const musicDerrota = new Audio('derrota.wav');

        function sonarClick() { sfxClick.currentTime=0; sfxClick.play().catch(e=>{}); }
        function sonarSeleccion() { sfxSelect.currentTime=0; sfxSelect.play().catch(e=>{}); }
        function sonarJugarCarta() { sfxJugar.currentTime=0; sfxJugar.play().catch(e=>{}); }

        // --- LÓGICA ---
        var socket = io();
        var miId="", miNombre="", nombreRival="Oponente";
        var poolCartas=[], idsDesbloqueados=[], seleccionadasIndices=[], cartaIdIntentandoDesbloquear=-1;
        var misCartas=[], atributoDelTurno=-1, bloqueado=false, miCartaEnMesa=null, rivalJugo=false, idRetadorPendiente=null;

        function entrarLobby() {
            let n = document.getElementById('inputNombre').value.trim();
            if(!n) return alert("Nombre obligatorio");
            miNombre = n;
            audioFondo.play().catch(e=>{}); 
            socket.emit('registrarUsuario', n);
        }

        socket.on('registroExitoso', () => { document.getElementById('pantalla-login').style.display='none'; document.getElementById('pantalla-lobby').style.display='flex'; document.getElementById('saludoLobby').innerText="Hola, "+miNombre; });
        function buscarPartida(m) { socket.emit('buscarPartida', m); }
        function retarAmigo() { let r=document.getElementById('inputRival').value.trim(); if(!r||r===miNombre)return alert("Inválido"); socket.emit('retarJugador',r); }
        socket.on('mensajeEspera', (msg)=>{ document.getElementById('modal-espera').style.display='flex'; document.getElementById('textoEspera').innerText=msg; });
        socket.on('errorReto', (msg)=>{ alert(msg); cerrarModal('modal-espera'); });
        socket.on('solicitudReto', (data)=>{ idRetadorPendiente=data.idRetador; document.getElementById('textoInvitacion').innerText=`¡${data.nombreRetador} te desafía!`; document.getElementById('modal-invitacion').style.display='flex'; });
        function responderInvitacion(acepta) { document.getElementById('modal-invitacion').style.display='none'; socket.emit('respuestaReto',{acepta:acepta,idRetador:idRetadorPendiente}); if(acepta){ document.getElementById('modal-espera').style.display='flex'; document.getElementById('textoEspera').innerText="Iniciando..."; } }

        socket.on('initSeleccion', function(data) {
            miId=data.id; poolCartas=data.todasLasCartas; idsDesbloqueados=data.misDesbloqueos||[]; nombreRival=data.rivalNombre||"Oponente";
            cerrarModal('modal-espera'); document.getElementById('pantalla-lobby').style.display='none'; document.getElementById('pantalla-seleccion').style.display='flex';
            seleccionadasIndices=[]; dibujarSeleccion(); actualizarBotonComenzar();
        });

        function cerrarModal(id) { document.getElementById(id).style.display='none'; }

        function dibujarSeleccion() {
            let g=document.getElementById('gridCartas'); g.innerHTML="";
            poolCartas.forEach((c,i)=>{
                let d=document.createElement('div');
                let blq=c.bloqueada&&!idsDesbloqueados.includes(c.id); let sel=seleccionadasIndices.includes(i);
                d.className=`carta-seleccion ${blq?"carta-bloqueada":(sel?"seleccionada":"")}`;
                d.innerHTML=`<div class="carta-titulo" style="font-size:11px;">${c.nombre}</div><img src="${c.img}" class="img-mini">${blq?'<div class="candado-icon">🔒</div>':''}`;
                d.onclick=()=>{ if(blq){ cartaIdIntentandoDesbloquear=c.id; document.getElementById('modal-codigo').style.display='flex'; sonarClick(); } else { toggleSeleccion(i); sonarSeleccion(); } };
                g.appendChild(d);
            });
        }
        function toggleSeleccion(i) {
            if(seleccionadasIndices.includes(i)) seleccionadasIndices=seleccionadasIndices.filter(x=>x!==i); else if(seleccionadasIndices.length<5) seleccionadasIndices.push(i);
            dibujarSeleccion(); actualizarBotonComenzar();
        }
        function actualizarBotonComenzar() {
            let btn=document.getElementById('btnComenzar');
            document.getElementById('msgSeleccion').innerText=`Cartas: ${seleccionadasIndices.length} / 5`;
            btn.className=(seleccionadasIndices.length===5)?'activo':''; btn.disabled=(seleccionadasIndices.length!==5);
        }
        function enviarSeleccion() { if(seleccionadasIndices.length===5){ socket.emit('jugadorListo',seleccionadasIndices); document.getElementById('btnComenzar').innerText="Esperando..."; document.getElementById('btnComenzar').disabled=true; } }
        function verificarCodigo() { socket.emit('intentarDesbloquear',{idCarta:cartaIdIntentandoDesbloquear, codigo:document.getElementById('inputCodigo').value}); }
        socket.on('desbloqueoExitoso', (data)=>{ idsDesbloqueados.push(data.id); cerrarModal('modal-codigo'); document.getElementById('nombreCartaDesbloqueada').innerText=data.nombre; document.getElementById('modal-exito').style.display='flex'; dibujarSeleccion(); });
        socket.on('errorDesbloqueo', (msg)=>document.getElementById('errorCodigo').innerText=msg);

        socket.on('inicioJuego', ()=>{ document.getElementById('pantalla-seleccion').style.display='none'; document.getElementById('pantalla-juego').style.display='flex'; document.getElementById('mensaje').innerText="¡BATALLA!"; dibujarMesaEsperando(); document.getElementById('miMano').innerHTML=""; });
        socket.on('girarDado', ()=>{ document.getElementById('overlay-dado').style.display='flex'; });
        socket.on('nuevoTurno', (data)=>{ document.getElementById('overlay-dado').style.display='none'; document.getElementById('dado').innerText=data.atributo.toUpperCase(); document.getElementById('mensaje').innerText=`Turno de ${data.atributo}`; atributoDelTurno=data.indiceAtributo; bloqueado=false; miCartaEnMesa=null; rivalJugo=false; dibujarMesaEsperando(); dibujarMano(); });
        socket.on('actualizarMano', (m)=>{ misCartas=m; dibujarMano(); });
        socket.on('cartaJugadaAnuncio', (id)=>{ if(id!==miId){ rivalJugo=true; document.getElementById('mensaje').innerText="Rival jugó."; }else{ document.getElementById('mensaje').innerText="Esperando..."; } dibujarMesaEsperando(); });
        
        socket.on('resultado', (d)=>{ 
            document.getElementById('mensaje').innerText=d.texto; let cr=d.cartas.find(c=>c.dueno!==miId); let cm=d.cartas.find(c=>c.dueno===miId);
            document.getElementById('mesa').innerHTML=`<div class="slot-vacio">${nombreRival}${generarHTMLCartaMesa(cr,d.ganador)}</div><div style="font-size:30px;font-weight:bold;color:#fff;">VS</div><div class="slot-vacio">${miNombre}${generarHTMLCartaMesa(cm,d.ganador)}</div>`;
        });

        socket.on('juegoTerminado', (d)=>{ 
            let gano=(d.ganador===miId); document.getElementById('mensaje').innerText=gano?"¡VICTORIA!":"DERROTA"; document.body.style.backgroundColor=gano?"#003300":"#330000";
            audioFondo.pause(); if(gano)musicVictoria.play(); else musicDerrota.play();
            document.getElementById('mesa').innerHTML+=`<div class="contenedor-botones-fin"><button class="btn-fin btn-mismo" onclick="elegirMismo(); sonarClick();">MISMO MAZO</button><button class="btn-fin btn-cambiar" onclick="elegirCambiar(); sonarClick();">CAMBIAR MAZO</button><button class="btn-fin btn-salir" onclick="salirAlMenu(); sonarClick();">SALIR</button></div>`; bloqueado=true; dibujarMano();
        });

        function elegirMismo() { document.getElementById('mesa').innerHTML="<h2>Esperando...</h2>"; socket.emit('decisionFinPartida','mismo'); audioFondo.currentTime=0; audioFondo.play(); }
        function elegirCambiar() { socket.emit('decisionFinPartida','cambiar'); audioFondo.currentTime=0; audioFondo.play(); }
        function salirAlMenu() { socket.emit('decisionFinPartida','salir'); location.reload(); }
        socket.on('esperandoRivalEndGame', ()=>document.getElementById('mesa').innerHTML="<h2>Esperando rival...</h2>");
        socket.on('rivalAbandono', ()=>{ alert("Rival salió."); location.reload(); });
        socket.on('resetTotal', ()=>location.reload());

        function dibujarMesaEsperando() {
            let hr=rivalJugo?`<div class="carta-dorso"></div>`:`<div style="color:#ddd">Esperando...</div>`;
            let hm=miCartaEnMesa?`<div class="carta" style="border-color:gold"><div class="carta-titulo">${miCartaEnMesa.nombre}</div><img src="${miCartaEnMesa.img}" class="carta-img"><div style="background:orange;width:100%;font-weight:bold;">${miCartaEnMesa.stats[atributoDelTurno]}</div></div>`:`<div style="color:#ddd">Tu carta</div>`;
            document.getElementById('mesa').innerHTML=`<div class="slot-vacio">${nombreRival}${hr}</div><div style="font-size:30px;font-weight:bold;">VS</div><div class="slot-vacio">${miNombre}${hm}</div>`;
        }
        function generarHTMLCartaMesa(o,g) { if(!o)return""; return `<div class="carta" style="border-color:${o.dueno===g?"#0f0":"#f00"}"><div class="carta-titulo">${o.carta.nombre}</div><img src="${o.carta.img}" class="carta-img"><div style="background:gold;width:100%;font-weight:bold;">${o.carta.stats[atributoDelTurno]}</div></div>`; }

        function dibujarMano() {
            let c=document.getElementById('miMano'); c.innerHTML="";
            // Estadísticas completas porque ahora las cartas son grandes
            const labels = ["Int", "Ast", "Mag", "Vel", "Val", "Fue", "Sab", "Agi"];
            misCartas.forEach((k,i)=>{
                let d=document.createElement('div'); d.className=bloqueado?'carta carta-deshabilitada':'carta';
                let s = labels.map((l,x)=>`<div class="stat-item" style="${x===atributoDelTurno?'background:orange;font-weight:bold':''}">${l}:${k.stats[x]}</div>`).join("");
                d.innerHTML=`<div class="carta-titulo">${k.nombre}</div><img src="${k.img}" class="carta-img"><div class="carta-stats">${s}</div>`;
                d.onclick=()=>{ if(atributoDelTurno!==-1&&!bloqueado){ miCartaEnMesa=k; socket.emit('jugarCarta',i); bloqueado=true; sonarJugarCarta(); dibujarMesaEsperando(); dibujarMano(); } };
                c.appendChild(d);
            });
        }
    </script>
</body>
</html>
